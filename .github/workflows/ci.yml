name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Import contracts (capas)
        run: uv run lint-imports

      - name: Tests
        run: uv run pytest
