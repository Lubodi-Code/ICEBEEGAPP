[project]
name = "iceberg-dto"
version = "0.1.0"
description = "Capa transversal — schemas Pydantic (request/response). No importa otras capas."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iceberg_dto"]
