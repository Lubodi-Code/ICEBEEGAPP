[project]
name = "iceberg-api"
version = "0.1.0"
description = "Capa de servidor — FastAPI (CRUD, páginas públicas, video)"
requires-python = ">=3.12"
dependencies = [
    "iceberg-negocio",
    "iceberg-dto",
    "iceberg-accesodatos",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    "sqlmodel>=0.0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iceberg_api"]

[tool.uv.sources]
iceberg-negocio = { workspace = true }
iceberg-dto = { workspace = true }
iceberg-accesodatos = { workspace = true }
