[project]
name = "iceberg-accesodatos"
version = "0.1.0"
description = "Capa de acceso a datos — settings, engine y sesión"
requires-python = ">=3.12"
dependencies = [
    "sqlmodel>=0.0.22",
    "pydantic-settings>=2.4",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iceberg_accesodatos"]
