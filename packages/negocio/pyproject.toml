[project]
name = "iceberg-negocio"
version = "0.1.0"
description = "Capa de negocio — servicios, mapeo entity<->dto, factory DI, storage y video"
requires-python = ">=3.12"
dependencies = [
    "iceberg-entities",
    "iceberg-accesodatos",
    "iceberg-repositorio",
    "iceberg-dto",
    "sqlmodel>=0.0.22",
    "boto3>=1.34",
    "pillow>=10.3",
    "python-slugify>=8.0",
    "moviepy>=2.1",
    "numpy>=1.26",
    "edge-tts>=7.0",
    "playwright>=1.45",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iceberg_negocio"]

[tool.uv.sources]
iceberg-entities = { workspace = true }
iceberg-accesodatos = { workspace = true }
iceberg-repositorio = { workspace = true }
iceberg-dto = { workspace = true }
